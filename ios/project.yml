name: GymScan
options:
  bundleIdPrefix: com.gymscan
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  GymScan:
    type: application
    platform: iOS
    sources:
      - Sources/GymScan
    resources:
      - Assets.xcassets
      - path: Sources/GymScan/Resources
        buildPhase: resources
    info:
      path: GymScan-Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSCameraUsageDescription: "GymScan needs camera access to scan gym equipment"
        NSMicrophoneUsageDescription: "GymScan needs microphone access for video recording"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iPhone:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: "GymScan"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: true
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 7K2995354P
        CODE_SIGN_IDENTITY: "Apple Development"
